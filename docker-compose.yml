services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env.example
    environment:
      APP__ENVIRONMENT: development
      APP__DEBUG: "true"
      DATABASE__HOST: db
      STORAGE__ENDPOINT: minio:9000
      STORAGE__PUBLIC_ENDPOINT: localhost:9000
      STORAGE__PUBLIC_SECURE: "false"
      REDIS__HOST: redis
      RUN_MIGRATIONS: "true"
    command:
      - uv
      - run
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - api-venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  api-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    env_file:
      - .env.prod.example
    environment:
      DATABASE__HOST: db
      STORAGE__ENDPOINT: minio:9000
      STORAGE__PUBLIC_ENDPOINT: localhost:9000
      STORAGE__PUBLIC_SECURE: "false"
      REDIS__HOST: redis
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lean_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d lean_generator
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done
        mc mb --ignore-existing local/documents

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env.example
    environment:
      APP__ENVIRONMENT: development
      APP__DEBUG: "true"
      DATABASE__HOST: db
      STORAGE__ENDPOINT: minio:9000
      STORAGE__PUBLIC_ENDPOINT: localhost:9000
      STORAGE__PUBLIC_SECURE: "false"
      REDIS__HOST: redis
      RUN_MIGRATIONS: "false"
    command:
      - uv
      - run
      - celery
      - -A
      - app.workers.celery_app:celery_app
      - worker
      - --loglevel=info
      - --queues=document-generation
    volumes:
      - .:/app
      - worker-venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    env_file:
      - .env.prod.example
    environment:
      DATABASE__HOST: db
      STORAGE__ENDPOINT: minio:9000
      STORAGE__PUBLIC_ENDPOINT: localhost:9000
      STORAGE__PUBLIC_SECURE: "false"
      REDIS__HOST: redis
      RUN_MIGRATIONS: "false"
    command:
      - uv
      - run
      - celery
      - -A
      - app.workers.celery_app:celery_app
      - worker
      - --loglevel=info
      - --queues=document-generation
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  api-venv:
  worker-venv:
  postgres-data:
  minio-data:
