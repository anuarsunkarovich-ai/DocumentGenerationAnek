services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    env_file:
      - .env.prod
    environment:
      DATABASE__HOST: db
      STORAGE__ENDPOINT: minio:9000
      REDIS__HOST: redis
      RUN_MIGRATIONS: "true"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./deploy/secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5)
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    env_file:
      - .env.prod
    environment:
      DATABASE__HOST: db
      STORAGE__ENDPOINT: minio:9000
      REDIS__HOST: redis
      RUN_MIGRATIONS: "false"
    command:
      - uv
      - run
      - celery
      - -A
      - app.workers.celery_app:celery_app
      - worker
      - --loglevel=info
      - --queues=document-generation
    volumes:
      - ./deploy/secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
    env_file:
      - .env.prod
    environment:
      DATABASE__HOST: db
      STORAGE__ENDPOINT: minio:9000
      REDIS__HOST: redis
      RUN_MIGRATIONS: "false"
    command:
      - uv
      - run
      - celery
      - -A
      - app.workers.celery_app:celery_app
      - beat
      - --loglevel=info
    volumes:
      - ./deploy/secrets:/run/secrets:ro
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lean_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/database_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/secrets:/run/secrets:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d lean_generator
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$$(cat /run/secrets/redis_password)"
    volumes:
      - ./deploy/secrets:/run/secrets:ro
      - redis-data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$(cat /run/secrets/redis_password)" ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/storage_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/storage_secret_key
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
      - ./deploy/secrets:/run/secrets:ro
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_started
    volumes:
      - ./deploy/secrets:/run/secrets:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$(cat /run/secrets/storage_access_key)" "$$(cat /run/secrets/storage_secret_key)"; do
          sleep 1
        done
        mc mb --ignore-existing local/documents

volumes:
  postgres-data:
  redis-data:
  minio-data:
